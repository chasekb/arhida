# GitHub Actions CI/CD Workflow
# Builds and pushes Docker image to GitHub Container Registry

name: Build and Push Docker Image

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ steps.meta.outputs.created }}
            VERSION=${{ github.ref_name }}
            REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  test:
    runs-on: ubuntu-latest
    needs: build
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
      embeddings:
        image: ghcr.io/chasekb/arhida-embeddings:local
        env:
          MODEL_NAME: bge-small-en-v1.5
          MODEL_DIMENSION: 384
          MAX_BATCH_SIZE: 64
          DEVICE: cpu
          ORT_EXECUTION_PROVIDER: CPU
          ACCELERATOR_BACKEND: onnx
          STRICT_MODEL_VALIDATION: false
          SERVICE_PORT: 8000
          REQUEST_TIMEOUT_MS: 30000
        ports:
          - 8000:8000
    steps:
      - name: Pull image
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Wait for qdrant health
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:6333/healthz >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "qdrant health check timed out"
          exit 1

      - name: Wait for embeddings health
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "embeddings health check timed out"
          exit 1
      
      - name: Run tests
        run: |
          docker run --rm \
            --network host \
            -e VECTOR_DB_PROVIDER=qdrant \
            -e QDRANT_URL=http://127.0.0.1:6333 \
            -e QDRANT_COLLECTION=arxiv_metadata_ci \
            -e VECTOR_SIZE=384 \
            -e EMBEDDING_SERVICE_URL=http://127.0.0.1:8000 \
            -e EMBEDDING_MODEL_NAME=bge-small-en-v1.5 \
            -e EMBEDDING_MAX_BATCH_SIZE=64 \
            -e EMBEDDING_RETRY_COUNT=2 \
            -e ARXIV_BATCH_SIZE=5 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --mode recent

  release:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/*.tar.gz
            build/*.deb
          generate_release_notes: true
